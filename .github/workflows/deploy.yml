name: Deploy Heritage Atlas to GitHub Pages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install --registry=https://registry.npmjs.org/
      - name: Build
        run: npm run build
      - name: Fetch latest release dataset
        run: >-
          curl --fail --location --retry 3
          --output dist/data/atlas-sample.zip
          https://github.com/Liuuzaki/HeritageAtlas/releases/latest/download/atlas-sample.zip
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
